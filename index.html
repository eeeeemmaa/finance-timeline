const HOLIDAYS = new Set([
  '2026-01-01','2026-01-27','2026-01-28','2026-01-29', // 신정, 설
  '2026-03-01','2026-03-02',  // 삼일절 + 대체(일요일이므로 월요일 대체)
  '2026-05-01','2026-05-05',  // 근로자의날, 어린이날

  '2026-10-03','2026-10-09',  // 개천절, 한글날
  '2026-12-25',               // 크리스마스
]);

function isBizDay(d) {
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return false;
  return !HOLIDAYS.has(toYMD(d));
}

function toYMD(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate()+n); return r;
}

// N번째 영업일 (month: 1-indexed)
function nthBizDay(year, month, n) {
  let d = new Date(year, month-1, 1);
  let count = 0;
  while (true) {
    if (isBizDay(d)) { count++; if (count === n) return new Date(d); }
    d = addDays(d, 1);
  }
}

// N번째 특정 요일 (weekday: 0=일,1=월...5=금,6=토)
function nthWeekday(year, month, weekday, n) {
  let d = new Date(year, month-1, 1);
  let count = 0;
  while (true) {
    if (d.getDay() === weekday) { count++; if (count === n) return new Date(d); }
    d = addDays(d, 1);
  }
}

function fmt(d) {
  return (d.getMonth()+1)+'/'+d.getDate();
}

// ── 동적 이벤트 생성 (월결산 일정, 4월분~12월분) ──────────────
// 결의서 마감: 익월 3영업일 / 장부 마감: 익월 10영업일
// 결산보고: 4주차 월(재무→CFO) / 수(CFO→경영진) / 금(투자사)

const DYNAMIC = [];

// 결산 마감 일정 — 7월 결산(8월 마감)부터 12월 결산(1월 마감)까지 자동 계산
// (4~6월은 Slack 확인된 날짜로 STATIC에 이미 반영)
for (let closeMonth = 7; closeMonth <= 12; closeMonth++) {
  const deadlineMonth = closeMonth + 1; // 익월
  const deadlineYear  = deadlineMonth > 12 ? 2027 : 2026;
  const dm = deadlineMonth > 12 ? deadlineMonth - 12 : deadlineMonth;

  const d3  = nthBizDay(deadlineYear, dm, 3);
  const d10 = nthBizDay(deadlineYear, dm, 10);

  DYNAMIC.push({
    date: toYMD(d3), cat:'close',
    title: `${closeMonth}월 결산 결의서 상신 마감`,
    note: `익월 3영업일 기준`,
    badge:'결의서'
  });
  DYNAMIC.push({
    date: toYMD(d10), cat:'close',
    title: `${closeMonth}월 결산 장부 마감`,
    note: `익월 10영업일 기준`,
    badge:'장부마감'
  });
}

// 결산보고 일정: 4주차 금요일(투자사)을 기준으로, 그 주 수(CFO→경영진), 그 주 월(재무→CFO)
// 재고·물류비 조정 지급: 매월 10일, 20일 (계약서 명시 건 · 휴일 시 D+1 영업일)
function nextBizFrom(year, month, day) {
  let d = new Date(year, month-1, day);
  while (!isBizDay(d)) d = addDays(d, 1);
  return d;
}
for (let m = 1; m <= 12; m++) {
  const d10 = nextBizFrom(2026, m, 10);
  const d20 = nextBizFrom(2026, m, 20);
  DYNAMIC.push({date:toYMD(d10), cat:'pay', title:'재고·물류비 지급 (계약 건)', note:`매월 10일 기준 · 계약서 명시 건 · 휴일 시 D+1`,badge:'조정지불'});
  DYNAMIC.push({date:toYMD(d20), cat:'pay', title:'재고·물류비 지급 (계약 건)', note:`매월 20일 기준 · 계약서 명시 건 · 휴일 시 D+1`,badge:'조정지불'});
}

// 수시 지불: 매주 목요일 (영업일만 · 공휴일·주말 제외)
(function() {
  let d = new Date(2026, 0, 1);
  while (d.getDay() !== 4) d = addDays(d, 1); // 첫 목요일
  while (d.getFullYear() === 2026) {
    if (isBizDay(d)) {
      DYNAMIC.push({date:toYMD(d), cat:'pay', title:'수시 지불', note:'전주 월~금 소속 리더 완결 건 → 차주 목요일 지급',badge:'수시지불'});
    }
    d = addDays(d, 7);
  }
})();

// 결산보고: 6월(5월분)부터 12월(11월분)까지 — 4주차 금요일 기준, 제목은 전월분 기재
for (let m = 6; m <= 12; m++) {
  const fri4 = nthWeekday(2026, m, 5, 4); // 4번째 금요일 (투자사 보고 기준일)
  const wed  = addDays(fri4, -2);           // 같은 주 수요일
  const mon  = addDays(fri4, -4);           // 같은 주 월요일

  DYNAMIC.push({date:toYMD(mon), cat:'report',title:`${m-1}월 결산 재무팀→CFO 보고`,note:`4주차 금요일(${fmt(fri4)}) 기준 · 해당 주 월요일`,badge:'내부보고'});
  DYNAMIC.push({date:toYMD(wed), cat:'report',title:`${m-1}월 결산 CFO→경영진 공유`,note:`4주차 금요일(${fmt(fri4)}) 기준 · 해당 주 수요일`,badge:'경영진보고'});
  DYNAMIC.push({date:toYMD(fri4),cat:'report',title:`${m-1}월 투자사 월간보고`,   note:`4주차 금요일 (${fmt(fri4)})`,badge:'투자사보고'});
}

const ALL_EVENTS = [...STATIC, ...DYNAMIC];

// ── 렌더링 ────────────────────────────────────────────────────────
const today = new Date(); today.setHours(0,0,0,0);

function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtShort(s) { const [,m,d]=s.split('-').map(Number); return `${m}/${d}`; }
function dayDiff(d) { return Math.round((d - today)/86400000); }

document.getElementById('todayBadge').textContent =
  `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;

function refreshUpcoming(cat) {
  const upcoming = ALL_EVENTS.filter(e => {
    const diff = dayDiff(parseDate(e.date));
    return diff >= 0 && (cat==='all' || e.cat===cat);
  }).sort((a,b)=>a.date.localeCompare(b.date));
  const bar = document.getElementById('upcomingBar');
  if (!upcoming.length) { bar.textContent='앞으로 남은 일정 없음'; return; }
  const next = upcoming[0];
  const diff = dayDiff(parseDate(next.date));
  const label = diff===0?'오늘':`D-${diff}`;
  bar.innerHTML = `⏰ 다음 일정: <strong>${fmtShort(next.date)} ${next.title}</strong> <span style="opacity:.7">(${label})</span>`;
}

function render(cat) {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  const grouped = {};
  ALL_EVENTS.forEach(e => {
    const [y,m] = e.date.split('-').map(Number);
    const key = `${y}-${String(m).padStart(2,'0')}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(e);
  });
  Object.keys(grouped).sort().forEach(key => {
    const [,m] = key.split('-').map(Number);
    const visible = grouped[key].filter(e => cat==='all' || e.cat===cat);
    if (!visible.length) return;
    const block = document.createElement('div');
    block.className = 'month-block';
    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.innerHTML = `<span class="month-label">${m}월</span><span class="month-line"></span><span class="month-count">${visible.length}건</span>`;
    block.appendChild(hdr);
    const grid = document.createElement('div');
    grid.className = 'events-grid';
    visible.sort((a,b)=>a.date.localeCompare(b.date)).forEach(e => {
      const pd = parseDate(e.date);
      const diff = dayDiff(pd);
      const card = document.createElement('div');
      card.className = `event-card${diff < 0 ? ' past' : ''}${e.delayed ? ' delayed' : ''}`;
      card.dataset.cat = e.cat;
      const dow = ['일','월','화','수','목','금','토'][pd.getDay()];
      card.innerHTML = `
        <span class="event-date">${fmtShort(e.date)} (${dow})</span>
        <span class="event-dot"></span>
        <div class="event-content">
          <div class="event-title">${e.title}</div>
          ${e.note ? `<div class="event-note">${e.note}</div>` : ''}
        </div>
        ${e.badge ? `<span class="event-badge">${e.badge}</span>` : ''}`;
      grid.appendChild(card);
    });
    block.appendChild(grid);
    timeline.appendChild(block);
  });
}

// ── 필터 버튼 ────────────────────────────────────────────────────
let currentCat = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render(currentCat);
    refreshUpcoming(currentCat);
  });
});

render('all');
refreshUpcoming('all');
