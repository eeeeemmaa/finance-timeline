const today=new Date();today.setHours(0,0,0,0);
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fs(s){const[,m,d]=s.split('-').map(Number);return m+'/'+d;}
function dd(d){return Math.round((d-today)/86400000);}
document.getElementById('todayBadge').textContent=today.getFullYear()+'년 '+(today.getMonth()+1)+'월 '+today.getDate()+'일';
function upcoming(cat){
  const u=ALL.filter(e=>dd(pd(e.date))>=0&&(cat==='all'||e.cat===cat)).sort((a,b)=>a.date.localeCompare(b.date));
  const bar=document.getElementById('upcomingBar');
  if(!u.length){bar.textContent='앞으로 남은 일정 없음';return;}
  const n=u[0],dif=dd(pd(n.date));
  bar.innerHTML=`⏰ 다음: <strong>${fs(n.date)} ${n.title}</strong> <span style="opacity:.7">(${dif===0?'오늘':'D-'+dif})</span>`;
}
function render(cat){
  const tl=document.getElementById('timeline');tl.innerHTML='';
  const g={};
  ALL.forEach(e=>{const k=e.date.slice(0,7);if(!g[k])g[k]=[];g[k].push(e);});
  Object.keys(g).sort().forEach(k=>{
    const m=parseInt(k.split('-')[1]);
    const vis=g[k].filter(e=>cat==='all'||e.cat===cat);
    if(!vis.length)return;
    const blk=document.createElement('div');
    blk.innerHTML=`<div class="month-header"><span class="month-label">${m}월</span><span class="month-line"></span><span class="month-count">${vis.length}건</span></div>`;
    const gr=document.createElement('div');gr.className='events-grid';
    vis.sort((a,b)=>a.date.localeCompare(b.date)).forEach(ev=>{
      const dif=dd(pd(ev.date)),past=dif<0;
      const c=document.createElement('div');
      c.className='event-card'+(past?' past':'')+(ev.delayed?' delayed':'');
      c.dataset.cat=ev.cat;
      let dl=fs(ev.date);
      if(dif===0)dl+=' 🔴';
      else if(dif>0&&dif<=14)dl+=` <span style="color:#e67e22;font-weight:800">D-${dif}</span>`;
      c.innerHTML=`<div class="event-date">${dl}</div><div class="event-dot"></div><div class="event-content"><div class="event-title">${ev.title}</div>${ev.note?'<div class="event-note">'+ev.note+'</div>':''}</div><div class="event-badge">${ev.badge}</div>`;
      gr.appendChild(c);
    });
    blk.appendChild(gr);tl.appendChild(blk);
  });
  upcoming(cat);
}
let ac='all';
document.querySelectorAll('.filter-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');ac=b.dataset.cat;render(ac);
  });
});
render(ac);
</script>
</body>
</html>
